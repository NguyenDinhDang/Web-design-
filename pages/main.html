    <title>Trang chủ Đặng Đình Nguyên</title>
    <style>
        /* Ép Full màn hình, không cho cuộn trang */
        html, body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: "Times New Roman", Times, serif;
        }

        .main-table {
            width: 100%; height: 100vh;
            border-collapse: collapse;
            table-layout: fixed; 
        }

        /* Header */
        .header-cell {
            height: 15vh;
            background-color: #faebd7; 
            position: relative;
            border-bottom: 1px solid #ccc;
        }

        .logout-btn {
            position: absolute; top: 15px; left: 20px; 
            color: red; border: 1px solid red; 
            padding: 3px 15px; text-decoration: none; 
            border-radius: 15px; font-weight: bold;
            background-color: white;
        }

        /* Thanh Menu Pink */
        .nav-bar {
            height: 5vh;
            background-color: pink;
            text-align: center;
            border-bottom: 1px solid #999;
        }

        .nav-bar a {
            color: black; font-weight: bold; 
            text-decoration: none; margin: 0 20px;
        }

        /* Sidebar Vàng: Đã được thu nhỏ lại 15% */
        .sidebar {
            width: 15%; 
            background-color: yellow; 
            vertical-align: top;
            border-right: 1px solid #ccc;
        }

        .sidebar-scroll {
            height: 75vh; /* Chiều cao trừ đi Header, Menu và Footer */
            overflow-y: auto; 
            padding: 10px;
        }

        .sidebar-scroll strong {
            display: block;
            margin-top: 15px; margin-bottom: 10px;
        }

        .sidebar-scroll a {
            display: block;
            color: blue;
            text-decoration: underline;
            margin-bottom: 8px;
        }
        
        .sidebar-scroll a:hover {
            color: red; 
        }

        /* Nội dung Iframe: Đã được phóng to 85% */
        .content-cell {
            width: 85%;
            background-color: aqua;
            vertical-align: top;
        }

        iframe {
            width: 100%; height: 100%; border: none;
        }

        /* Footer mới */
        .footer-cell {
            height: 5vh;
            background-color: #eeeeee;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
